name: Build/publish images
on:
  release:
    types: [published]
  pull_request:
    types: [labeled, opened, synchronize]
  push:
    branches:
      - master
jobs:
  generate-tags:
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.generate-tags.outputs.tags }}
    steps:
      - name: Generate list of image tags
        id: generate-tags
        shell: python
        run: |
          import os

          dockerhub_available = "${{ secrets.DOCKERHUB_TOKEN != '' }}" == "true"
          is_release = "${{ github.event_name }}" == "release"
          is_master = "${{ github.event_name }}" == "push" and "${{ github.ref }}" == "refs/heads/master"
          is_pr = "${{ github.event_name }}" == "pull_request"
          pr_has_build_label = "${{ contains(github.event.pull_request.labels.*.name, 'build-release-container') }}" == "true"

          commit_sha = "${{ github.sha }}"
          release_tag = "${{ github.event.release.tag_name }}"

          ghcr_image_base = "ghcr.io/josh-project/josh-proxy"
          dockerhub_image_base = "joshproject/josh-proxy"

          def main():
              tags = []

              if is_release:
                  tags.append(f"{ghcr_image_base}:{release_tag}")
                  tags.append(f"{ghcr_image_base}:latest")
                  if dockerhub_available:
                      tags.append(f"{dockerhub_image_base}:{release_tag}")
                      tags.append(f"{dockerhub_image_base}:latest")
              elif is_master:
                  short_sha = commit_sha[:10]
                  tags.append(f"{ghcr_image_base}:sha-{short_sha}")
              elif is_pr and pr_has_build_label:
                  tags.append(f"{ghcr_image_base}:pr-{pr_number}")

              # Write to GITHUB_OUTPUT
              # Multi-line output for tags
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("tags<<EOF\n")
                  f.write("\n".join(tags))
                  f.write("\nEOF\n")

                  # Also output whether we should build at all
                  f.write(f"should_build={'true' if tags else 'false'}\n")

              # Also print for visibility in logs
              print("Generated tags:")
              for tag in tags:
                  print(f"  - {tag}")

          main()
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
#    if: >-
#      ${{ github.event_name == 'release'
#          || (github.event_name == 'pull_request'
#              && github.event.label.name == 'build-release-container') }}
    steps:
      - name: Setup BuildX
        uses: docker/setup-buildx-action@v3
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Login to Docker Hub
        if: env.DOCKERHUB_TOKEN != ''

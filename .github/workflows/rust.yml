name: rust

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ '**' ]
  merge_group:

env:
  CARGO_TERM_COLOR: always
  JOSH_EXPERIMENTAL_FEATURES: "1"

jobs:
  test:
    runs-on: ubuntu-latest
    name: CI
    steps:
    - name: Free up disk space
      shell: bash
      run: |
        set -eu
        CLEANUP_DIRS=(
          "/usr/local/lib/android"
          "/usr/share/dotnet"
          "/usr/share/swift"
          "/usr/local/.ghcup"
        )
        for dir in "${CLEANUP_DIRS[@]}"; do
          if [[ -d "$dir" ]]; then
            echo "removing ${dir}"
            sudo rm -rf "$dir"
          fi
        done
    - name: Setup BuildX
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
    - name: Get tags
      run: git fetch --tags origin
    - name: Install podman
      shell: bash
      run: .github/workflows/scripts/install-podman.sh
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
    - name: Cache josh binary
      id: cache-josh
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: target/release/josh
        key: josh-binary-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml', 'josh-cli/**/*.rs', 'josh-core/**/*.rs', 'josh-filter/**/*.rs', 'josh-run/**/*.rs', 'josh-changes/**/*.rs') }}
    - name: Build josh binary
      if: steps.cache-josh.outputs.cache-hit != 'true'
      run: cargo build --release -p josh-cli
    - name: Run tests
      run: target/release/josh compose run

name: rust

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ '**' ]
  merge_group:

env:
  CARGO_TERM_COLOR: always
  JOSH_EXPERIMENTAL_FEATURES: "1"

jobs:
  test:
    runs-on: ubuntu-latest
    name: CI
    steps:
    - name: Free up disk space
      shell: bash
      run: |
        set -eu
        CLEANUP_DIRS=(
          "/usr/local/lib/android"
          "/usr/share/dotnet"
          "/usr/share/swift"
          "/usr/local/.ghcup"
        )
        for dir in "${CLEANUP_DIRS[@]}"; do
          if [[ -d "$dir" ]]; then
            echo "removing ${dir}"
            sudo rm -rf "$dir"
          fi
        done
    - name: Setup BuildX
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
    - name: Get tags
      run: git fetch --tags origin
    - name: Install podman
      shell: bash
      run: .github/workflows/scripts/install-podman.sh
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
    - name: Cache josh binary
      id: cache-josh
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: target/release/josh
        key: josh-binary-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'rust-toolchain.toml', 'josh-cli/**/*.rs', 'josh-core/**/*.rs', 'josh-filter/**/*.rs', 'josh-run/**/*.rs', 'josh-changes/**/*.rs') }}
    - name: Build josh binary
      if: steps.cache-josh.outputs.cache-hit != 'true'
      run: cargo build --release -p josh-cli
    - name: Run tests
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      run: target/release/josh compose run

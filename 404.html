<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting to josh-project.dev</title>
  <script>
    var path = window.location.pathname.replace(/^\/josh\//, "/docs/");
    window.location.href = "https://josh-project.dev" + path;
  </script>
</head>
<body>
  <p>Documentation has moved to
    <a id="newurl" href="https://josh-project.dev/docs/">josh-project.dev/docs/</a>.
  </p>
  <script>
    document.getElementById("newurl").href =
      "https://josh-project.dev" + window.location.pathname.replace(/^\/josh\//, "/docs/");
  </script>
</body>
</html>

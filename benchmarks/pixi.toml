[workspace]
authors = ["Vladislav Ivanov <vlad@ivanov.email>"]
channels = ["conda-forge"]
name = "benchmarks"
platforms = ["linux-64", "osx-arm64"]
version = "0.1.0"

[tasks]
select-folders = "python -m bench select-folders"
rust-lang = "python -m bench rust-lang"
rustc-josh-sync = "python -m bench rustc-josh-sync"

[dependencies]
python = ">=3.14.6,<3.15"
git-filter-repo = ">=2.47.0,<3"
git = ">=2.55.0,<3"
copybara = ">=20260713,<20260714"
quantiphy = ">=2.22.1,<3"

[pypi-dependencies]
altair = ">=6.2.2, <7"
pandas = ">=3.0.3, <4"
vl-convert-python = "*"
bench = { path = ".", editable = true }

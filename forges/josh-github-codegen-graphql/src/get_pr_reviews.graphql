query GetPrReviews($owner: String!, $name: String!, $number: Int!, $first: Int!, $after: String) {
  repository(owner: $owner, name: $name) {
    pullRequest(number: $number) {
      reviews(first: $first, after: $after) {
        nodes {
          author {
            __typename
            login
          }
          state
        }
        pageInfo {
          hasNextPage
          endCursor
        }
      }
    }
  }
}

query GetPrComments($owner: String!, $name: String!, $number: Int!) {
  repository(owner: $owner, name: $name) {
    pullRequest(number: $number) {
      title
      body
      createdAt
      author { __typename login }
      comments(first: 100) {
        nodes {
          id
          body
          author { __typename login }
          createdAt
        }
        pageInfo { hasNextPage endCursor }
      }
      reviews(first: 100) {
        nodes {
          id
          body
          author { __typename login }
          createdAt
          comments(first: 100) {
            nodes {
              id
              body
              author { __typename login }
              createdAt
              path
              line
              replyTo { __typename id }
            }
            pageInfo { hasNextPage endCursor }
          }
        }
        pageInfo { hasNextPage endCursor }
      }
    }
  }
}

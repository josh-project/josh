query GetPrComments($owner: String!, $name: String!, $number: Int!) {
  repository(owner: $owner, name: $name) {
    pullRequest(number: $number) {
      title
      body
      number
      url
      state
      isDraft
      createdAt
      updatedAt
      merged
      mergedAt
      mergedBy { __typename login }
      additions
      deletions
      changedFiles
      baseRefName
      headRefName
      statusCheckRollup {
        state
      }
      reviewDecision
      labels(first: 20) {
        nodes { name color }
      }
      author { __typename login }
      comments(first: 100) {
        nodes {
          id
          body
          author { __typename login }
          createdAt
        }
        pageInfo { hasNextPage endCursor }
      }
      reviews(first: 100) {
        nodes {
          id
          body
          author { __typename login }
          createdAt
          commit { oid }
          comments(first: 100) {
            nodes {
              id
              body
              author { __typename login }
              createdAt
              commit { oid }
              path
              line
              replyTo { __typename id }
            }
            pageInfo { hasNextPage endCursor }
          }
        }
        pageInfo { hasNextPage endCursor }
      }
    }
  }
}

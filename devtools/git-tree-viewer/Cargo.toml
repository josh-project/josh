[package]
name = "git-tree-viewer"
version = "0.1.0"
edition = "2021"

[lib]
path = "src/lib.rs"

[[bin]]
name = "git-tree-viewer"
path = "src/bin/git-tree-viewer.rs"

[dependencies]
git2 = { version = "0.21", default-features = false, features = ["vendored-openssl", "https"] }
anyhow = { version = "1", features = ["backtrace"] }
clap = { version = "4.6.1", features = ["derive", "env"] }
egui = "0.34.2"
eframe = { version = "0.34.2", default-features = false, features = ["wgpu", "wayland", "x11"] }
axum = { version = "0.8", default-features = false, features = ["http1", "json", "tokio"] }
tokio = { version = "1", default-features = false, features = ["rt-multi-thread", "net"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
josh-cq-test-components = { path = "../../cq/josh-cq-test-components" }
tempfile = "3"
